name: OAuth
description: ''
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/v1/auth/{provider}/redirect'
    metadata:
      custom: []
      groupName: OAuth
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'OAuth Redirect'
      description: |-
        Redirects the user to the Google or GitHub login page.
        Pass `google` or `github` as the provider parameter.
        After the user authenticates, they are sent to the callback endpoint.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      provider:
        custom: []
        name: provider
        description: 'The OAuth provider. Accepted: google, github.'
        required: true
        example: google
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      provider: google
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 302
        content: '{}'
        headers: []
        description: 'Redirects to provider login page'
      -
        custom: []
        status: 500
        content: |-
          {
              "message": "Server Error"
          }
        headers:
          cache-control: 'no-cache, private'
          content-type: application/json
          access-control-allow-origin: '*'
        description: null
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: 'api/v1/auth/{provider}/callback'
    metadata:
      custom: []
      groupName: OAuth
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'OAuth Callback'
      description: |-
        Handles the response from Google or GitHub after the user authenticates.
        Returns a Bearer token exactly like the login endpoint does.
        The frontend should redirect here and extract the token from the response.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      provider:
        custom: []
        name: provider
        description: 'The OAuth provider. Accepted: google, github.'
        required: true
        example: google
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      provider: google
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": "OAuth login successful",
            "data": {
              "token": "3|xxxxxxxxxxxxxxxxxxxxxxxx",
              "user": {
                "id": 2,
                "name": "Jane Doe",
                "email": "jane@gmail.com",
                "plan": "free",
                "credits_balance": 50
              }
            }
          }
        headers: []
        description: ''
      -
        custom: []
        status: 400
        content: |-
          {
            "success": false,
            "message": "Unsupported OAuth provider",
            "errors": null
          }
        headers: []
        description: ''
      -
        custom: []
        status: 500
        content: |-
          {
            "success": false,
            "message": "OAuth authentication failed",
            "errors": null
          }
        headers: []
        description: ''
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
